      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="38" cy="40" r="32" fill="url(#g1)" opacity="0.95"/>
  <circle cx="38" cy="40" r="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Masjid Dome -->
  <path d="M20 52 L22 36 L28 28 L34 24 L38 22 L42 24 L48 28 L54 36 L56 52 Z" fill="rgba(255,255,255,0.95)"/>
